<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>File Browser SPA</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background-color: black;
            color: #333;
        }
        #app {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #fafafa;
            border-bottom: 1px solid #eaeaea;
        }
        .action-bar {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #eaeaea;
        }
        .action-bar > * { margin-right: 20px; }
        .btn-primary {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary:hover { background-color: #005bb5; }
        .upload-status { margin-left: 15px; color: #666; font-size: 0.9em; }
        .upload-error { color: #d32f2f; margin-top: 5px; font-size: 0.9em; }
        .breadcrumbs a { color: #0066cc; text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }
        .stats-bar {
            padding: 10px 20px;
            font-size: 0.9em;
            color: #666;
            border-bottom: 1px solid #eaeaea;
        }
        .list-header, .list-item {
            display: flex;
            padding: 12px 20px;
            border-bottom: 1px solid #eaeaea;
        }
        .list-header { font-weight: bold; background: #fafafa; }
        .list-item:hover { background: #f9f9f9; }
        .item-name { flex: 2; display: flex; align-items: center; }
        .item-name .icon { margin-right: 10px; font-size: 1.2em; }
        .item-size { flex: 1; text-align: right; }
        .item-date { flex: 1; text-align: right; }
        .item-actions { flex: 0.5; text-align: center; display: flex; justify-content: space-evenly; align-items: center; }
        .item-actions a, .btn-delete { text-decoration: none; border: none; background: none; cursor: pointer; padding: 5px; border-radius: 4px; font-size: 1.1em; }
        .item-actions a:hover, .btn-delete:hover { background-color: #f0f0f0; }
        .btn-delete:hover { color: #d32f2f; }

        /* Dialog Styles */
        .custom-dialog {
            padding: 0;
            border: none;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
        }
        .custom-dialog::backdrop { background: rgba(0,0,0,0.5); }
        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fafafa;
            border-bottom: 1px solid #eaeaea;
        }
        .dialog-header h3 { margin: 0; font-size: 1.2em; }
        .btn-close-dialog {
            background: none; border: none; font-size: 1.5em; cursor: pointer; color: #666;
        }
        .btn-close-dialog:hover { color: #000; }
        .dialog-body { padding: 20px; overflow-y: auto; max-height: calc(80vh - 60px); }
        .dialog-footer { padding: 15px 20px; border-top: 1px solid #eaeaea; text-align: right; background: #fafafa;}
        
        /* Folder Picker Styles */
        .picker-breadcrumbs-container { padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; font-weight: bold; }
        .picker-breadcrumbs-container a { color: #0066cc; text-decoration: none; }
        .picker-list-container { min-height: 150px; max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .picker-folder-item { padding: 8px; border-bottom: 1px solid #f5f5f5; }
        .picker-folder-item a { color: #333; text-decoration: none; display: inline-block; width: 80%; }
        .picker-folder-item a:hover { text-decoration: underline; color: #0066cc; }
        .picker-footer { text-align: right; border-top: 1px solid #eee; padding-top: 10px; }
        
        /* Audio Player Styles */
        #audio-player-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #222;
            color: white;
            z-index: 100;
        }
        .audio-player-container .audio-player {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .audio-player .track-info { margin-right: 20px; font-weight: bold; }
        .audio-player audio { flex-grow: 1; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
