<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>File Browser SPA</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background-color: #f5f5f5;
            color: #333;
        }
        #app {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #fafafa;
            border-bottom: 1px solid #eaeaea;
        }
        .action-bar {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #eaeaea;
        }
        .btn-primary {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary:hover { background-color: #005bb5; }
        .upload-status { margin-left: 15px; color: #666; font-size: 0.9em; }
        .upload-error { color: #d32f2f; margin-top: 5px; font-size: 0.9em; }
        .breadcrumbs a { color: #0066cc; text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }
        .stats-bar {
            padding: 10px 20px;
            font-size: 0.9em;
            color: #666;
            border-bottom: 1px solid #eaeaea;
        }
        .list-header, .list-item {
            display: flex;
            padding: 12px 20px;
            border-bottom: 1px solid #eaeaea;
        }
        .list-header { font-weight: bold; background: #fafafa; }
        .list-item:hover { background: #f9f9f9; }
        .item-name { flex: 2; display: flex; align-items: center; }
        .item-name .icon { margin-right: 10px; font-size: 1.2em; }
        .item-size { flex: 1; text-align: right; }
        .item-date { flex: 1; text-align: right; }
        .item-actions { flex: 0.5; text-align: center; display: flex; justify-content: space-evenly; align-items: center; }
        .item-actions a, .btn-delete { text-decoration: none; border: none; background: none; cursor: pointer; padding: 5px; border-radius: 4px; font-size: 1.1em; }
        .item-actions a:hover, .btn-delete:hover { background-color: #f0f0f0; }
        .btn-delete:hover { color: #d32f2f; }
        
        .loading, .empty-state, .error-container {
            padding: 40px;
            text-align: center;
            color: #666;
        }
        .error-container { color: #d32f2f; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
